name: Build & Push FE

on:
  push:
    branches: [main, develop]

concurrency:
  group: deploy-fe-${{ github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/app-fe

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npx tsc -b --noEmit
      - run: npm test
      - run: npm run build

  build-and-push:
    name: Docker Build & Push
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "tags=${{ env.IMAGE }}:${{ github.sha }},${{ env.IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "event=fe-updated" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${{ env.IMAGE }}:dev-${{ github.sha }},${{ env.IMAGE }}:dev-latest" >> "$GITHUB_OUTPUT"
            echo "event=fe-dev-updated" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: kmu-capstone2026/deploy
          event-type: ${{ steps.tags.outputs.event }}
          client-payload: '{"image_tag": "${{ github.ref_name == ''main'' && github.sha || format(''dev-{0}'', github.sha) }}"}'
